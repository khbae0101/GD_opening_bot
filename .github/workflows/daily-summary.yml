name: Daily Telegram Summary
 
on:
  # 실행은 cron-job.org가 정시에 호출(dispatch)해서 시작됩니다.
  # Actions 탭에서 수동 실행도 가능합니다.
  workflow_dispatch:
 
jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
 
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
 
      - name: Install dependencies
        run: pip install requests anthropic
 
      - name: Run summary
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SOURCE_CHAT_ID:    ${{ secrets.SOURCE_CHAT_ID }}
          TARGET_CHAT_ID:    ${{ secrets.TARGET_CHAT_ID }}
        run: python summary_oneshot.py
 
